<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>物置 — aki</title>
    <link rel="icon" href="icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap"
    />
    <style>
      :root {
        --bg: #ffffff;
        --fg: #0b0b0b;
        --muted: #707070;
        --rule: #0b0b0b;
        --rule-soft: #d8d8d8;
        --max: 1100px;
        --gutter: clamp(1.25rem, 4vw, 3rem);
        --font-sans: "Hanken Grotesk", "Zen Kaku Gothic New", system-ui,
          sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo,
          monospace;
        --font-display: "Zen Kaku Gothic New", "Hanken Grotesk", system-ui,
          sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b0b0b;
          --fg: #f4f4f4;
          --muted: #8a8a8a;
          --rule: #f4f4f4;
          --rule-soft: #2a2a2a;
        }
      }

      * {
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: var(--font-sans);
        font-weight: 400;
        font-size: 16px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      ::selection {
        background: var(--fg);
        color: var(--bg);
      }

      .shell {
        max-width: var(--max);
        margin: 0 auto;
        padding: 1.5rem var(--gutter) 4rem;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 1rem;
        border-bottom: 1px solid var(--rule);
        padding-bottom: 1rem;
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .topbar .meta {
        color: var(--muted);
      }

      .hero {
        padding: 14vh 0 8vh;
      }

      .eyebrow {
        display: block;
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 1.75rem;
      }

      .title {
        font-family: var(--font-display);
        font-size: clamp(5rem, 18vw, 13rem);
        font-weight: 300;
        line-height: 0.92;
        letter-spacing: -0.04em;
        margin: 0;
      }

      .section {
        padding-top: 5rem;
      }

      .section-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 1rem;
        border-top: 1px solid var(--rule);
        padding-top: 1rem;
        margin-bottom: 1.75rem;
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .section-meta {
        color: var(--muted);
      }

      .list {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .list li + li {
        border-top: 1px solid var(--rule-soft);
      }

      .list a {
        display: grid;
        grid-template-columns: 3rem minmax(8rem, 1fr) 1fr auto;
        align-items: baseline;
        padding: 1.4rem 0;
        gap: 1rem;
      }

      .list a:hover .name {
        text-decoration: underline;
        text-decoration-thickness: 1px;
        text-underline-offset: 0.28em;
      }

      .list a:hover .arrow {
        color: var(--fg);
      }

      .list .num {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        color: var(--muted);
      }

      .list .name {
        font-weight: 500;
        font-size: clamp(1.4rem, 3.6vw, 2.25rem);
        letter-spacing: -0.01em;
      }

      .list .handle {
        font-family: var(--font-mono);
        font-size: 0.92rem;
        color: var(--muted);
      }

      .list .arrow {
        font-family: var(--font-mono);
        font-size: 0.95rem;
        color: var(--muted);
        justify-self: end;
      }

      .contact {
        display: grid;
        grid-template-columns: 9rem 1fr;
        column-gap: 1rem;
        row-gap: 0.5rem;
        margin: 0;
      }

      .contact dt {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
        padding-top: 0.45rem;
      }

      .contact dd {
        margin: 0;
        font-family: var(--font-mono);
        font-size: 1.15rem;
        letter-spacing: 0.01em;
        user-select: all;
      }

      .contact .note {
        grid-column: 2;
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .foot {
        margin-top: 8rem;
        padding-top: 1rem;
        border-top: 1px solid var(--rule);
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }

      @media (max-width: 640px) {
        .topbar,
        .section-head,
        .foot {
          font-size: 0.66rem;
        }
        .hero {
          padding: 8vh 0 6vh;
        }
        .list a {
          grid-template-columns: 2.25rem 1fr auto;
          grid-template-rows: auto auto;
          column-gap: 0.75rem;
          row-gap: 0.2rem;
          padding: 1.1rem 0;
        }
        .list .num {
          grid-column: 1;
          grid-row: 1 / span 2;
          align-self: center;
        }
        .list .name {
          grid-column: 2;
          grid-row: 1;
        }
        .list .handle {
          grid-column: 2;
          grid-row: 2;
        }
        .list .arrow {
          grid-column: 3;
          grid-row: 1 / span 2;
          align-self: center;
        }
        .contact {
          grid-template-columns: 1fr;
          row-gap: 0.25rem;
        }
        .contact .note {
          grid-column: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <span class="brand">aki</span>
        <span class="meta">物置 ／ index</span>
      </header>

      <section class="hero">
        <span class="eyebrow">A personal index — 個人的な索引</span>
        <h1 class="title">物置</h1>
      </section>

      <section class="section" aria-labelledby="profiles-head">
        <header class="section-head" id="profiles-head">
          <span>Profiles</span>
          <span class="section-meta">[01 — 05]</span>
        </header>
        <ul class="list">
          <li>
            <a href="https://twitter.com/ak11">
              <span class="num">01</span>
              <span class="name">Twitter</span>
              <span class="handle">@ak11</span>
              <span class="arrow" aria-hidden="true">↗</span>
            </a>
          </li>
          <li>
            <a href="https://github.com/ak110">
              <span class="num">02</span>
              <span class="name">GitHub</span>
              <span class="handle">ak110</span>
              <span class="arrow" aria-hidden="true">↗</span>
            </a>
          </li>
          <li>
            <a href="https://qiita.com/ak11">
              <span class="num">03</span>
              <span class="name">Qiita</span>
              <span class="handle">@ak11</span>
              <span class="arrow" aria-hidden="true">↗</span>
            </a>
          </li>
          <li>
            <a href="https://www.kaggle.com/ak1100">
              <span class="num">04</span>
              <span class="name">Kaggle</span>
              <span class="handle">ak1100</span>
              <span class="arrow" aria-hidden="true">↗</span>
            </a>
          </li>
          <li>
            <a
              href="https://user.competition.signate.jp/ja/user/?user=448be65bda764d4eb3ac053f243708d4"
            >
              <span class="num">05</span>
              <span class="name">SIGNATE</span>
              <span class="handle">aki.</span>
              <span class="arrow" aria-hidden="true">↗</span>
            </a>
          </li>
        </ul>
      </section>

      <section class="section" aria-labelledby="contact-head">
        <header class="section-head" id="contact-head">
          <span>Contact</span>
          <span class="section-meta">[mail]</span>
        </header>
        <dl class="contact">
          <dt>Email</dt>
          <dd>
            <span
              id="email"
              data-u="aki"
              data-d="tqzh.tk"
              aria-label="メールアドレス"
            ></span>
          </dd>
        </dl>
      </section>

      <footer class="foot">
        <span>© <span id="year">2026</span> aki</span>
        <span>物置 ／ Storehouse</span>
      </footer>
    </main>

    <script>
      (function () {
        var el = document.getElementById("email");
        if (el) {
          var u = el.getAttribute("data-u") || "";
          var d = el.getAttribute("data-d") || "";
          // HTMLソース上に "@" を直書きしないため動的に生成する
          el.textContent = u + String.fromCharCode(64) + d;
        }
        var yearEl = document.getElementById("year");
        if (yearEl) {
          yearEl.textContent = String(new Date().getFullYear());
        }
      })();
    </script>
  </body>
</html>
